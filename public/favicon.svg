<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- 문서 모양 -->
  <rect x="12" y="10" width="28" height="36" rx="4" fill="white" opacity="0.12"/>
  <rect x="12" y="10" width="28" height="36" rx="4" fill="none" stroke="white" stroke-width="1.2" opacity="0.3"/>

  <!-- "프" 큰 글자 -->
  <text
    x="26"
    y="36"
    font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif"
    font-size="26"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
  >프</text>

  <!-- 우측 하단 뱃지 -->
  <circle cx="46" cy="47" r="10" fill="#1e40af"/>
  <circle cx="46" cy="47" r="10" fill="white" opacity="0.08"/>

  <!-- 뱃지 안 작은 텍스트 -->
  <text
    x="46"
    y="47"
    font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif"
    font-size="8"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
  >롬</text>
</svg>
